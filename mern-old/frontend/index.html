<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Careers at FMPG | Join Our Team</title>
    <meta
      name="description"
      content="Explore exciting career opportunities at FMPG. Join a team shaping the future of property management and digital services."
    />
    <meta
      name="keywords"
      content="FMPG careers, jobs at FMPG, property management jobs, digital marketing jobs, tech jobs, FMPG hiring"
    />
    <meta name="author" content="FMPG" />

    <!-- ✅ Canonical + Parent Relation -->
    <link rel="canonical" href="https://fmpg.vercel.app/" />
    
    <!-- ✅ OpenGraph for LinkedIn/Facebook -->
    <meta property="og:site_name" content="FMPG Careers" />
    <meta property="og:url" content="https://fmpg.vercel.app/" />
    <meta property="og:title" content="Careers at FMPG | Join Our Team" />
    <meta
      property="og:description"
      content="Explore exciting career opportunities at FMPG. Join a team shaping the future of property management and digital services."
    />
    <meta property="og:image" content="https://fmpg.vercel.app/og-image.png" />
    <meta property="og:image:alt" content="FMPG Logo" />
    <meta property="og:type" content="website" />

    <!-- ✅ Twitter/X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Careers at FMPG | Join Our Team" />
    <meta
      name="twitter:description"
      content="Explore exciting career opportunities at FMPG. Join a team shaping the future of property management and digital services."
    />
    <meta name="twitter:image" content="https://fmpg.vercel.app/og-image.png" />
    <meta name="twitter:image:alt" content="FMPG Logo" />

    <link rel="icon" type="image/png" href="https://fmpg.vercel.app/logo.png" />

    <!-- ✅ Default JSON-LD Schema (Organization/Career Portal) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "FMPG Careers",
        "url": "https://fmpg.vercel.app/",
        "publisher": {
          "@type": "Organization",
          "name": "FMPG",
          "url": "https://fmpg.vercel.app",
          "logo": "https://fmpg.vercel.app/logo.png",
          "sameAs": [
            "https://www.facebook.com/fmpg",
            "https://www.instagram.com/fmpg",
            "https://www.linkedin.com/company/fmpg"
          ]
        }
      }
    </script>

    <!-- ✅ Robots -->
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />

    <!-- ✅ Preload and SEO boost -->
    <link rel="dns-prefetch" href="https://fmpg.vercel.app" />
    <link rel="preconnect" href="https://fmpg.vercel.app" />
  </head>

  <body>
    <noscript>
      <p>Please enable JavaScript to view the FMPG careers page.</p>
    </noscript>
    <div id="root"></div>

    <!-- ✅ IMPORTANT: Defer loading of main React bundle -->
    <script type="module" src="/src/main.jsx" ></script>
  </body>
</html>
